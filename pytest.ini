[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=backend --cov-report=term-missing --cov-fail-under=88

[coverage:run]
source = backend
omit =
    backend/__init__.py
    backend/models/__init__.py
    backend/routers/__init__.py
    backend/services/__init__.py

[coverage:report]
# Fail the build if total coverage drops below this percentage.
# Current baseline is 89 % — this allows a maximum drop of 1 %.
fail_under = 88
show_missing = true
skip_covered = false

