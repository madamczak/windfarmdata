# =============================================================================
# docker-compose.yml — Wind Farm Data (backend + frontend)
#
# Usage:
#   # Start everything (mounts local data/ as read-only into backend)
#   docker compose up --build
#
#   # Rebuild only the backend after a code change
#   docker compose up --build backend
#
#   # Stop and remove containers (data volume is preserved)
#   docker compose down
#
# The local data/ directory is mounted read-only into the backend container.
# No parquet files are baked into the image.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Backend — FastAPI served by Uvicorn
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: windfarmdata-backend

    # Load R2 credentials and storage settings.
    # Priority order (highest → lowest):
    #   1. environment: block below  (hardcoded / always-on values)
    #   2. Host shell env vars       ($env:R2_ACCESS_KEY_ID etc. in PowerShell)
    #   3. .env file on disk         (optional convenience – copy .env.example)
    env_file:
      - path: .env
        required: false

    # Persist the R2 download cache across container restarts
    volumes:
      - r2_cache:/app/.r2_cache

    environment:
      # Always use R2 as the storage backend in Docker (parquet files in R2)
      STORAGE_BACKEND: "r2"
      # Allow requests from the Nginx frontend container.
      # In production replace with your real frontend domain.
      CORS_ORIGINS: "http://localhost,http://localhost:80"
      # Pass R2 credentials through from the host shell environment.
      # In PowerShell set them with:
      #   $env:R2_ACCESS_KEY_ID      = "your-key"
      #   $env:R2_SECRET_ACCESS_KEY  = "your-secret"
      # Listing the key name with no value tells Compose to inherit from host.
      R2_ACCESS_KEY_ID:
      R2_SECRET_ACCESS_KEY:
      R2_ENDPOINT_URL: "https://7cf52f0e0957036ef8b28411ed958be4.r2.cloudflarestorage.com"
      R2_BUCKET_NAME: "windfarmdata"

    ports:
      # Expose directly for development; in production only Nginx needs access
      - "8000:8000"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/wind-farms')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Frontend — Vite build served by Nginx
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: windfarmdata-frontend

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  # Persists parquet files downloaded from R2 so they survive container restarts
  r2_cache:
