# =============================================================================
# docker-compose.yml — Wind Farm Data (backend + LGTM observability)
#
# The Vue 3 frontend is built into the backend image and served directly
# by FastAPI on port 8000 (mapped to host port 80 for convenience).
#
# Usage:
#   docker compose up --build
#   docker compose up --build backend
#   docker compose down
#
# LGTM stack (Loki + Grafana + Tempo + Mimir) is provided by grafana/otel-lgtm.
# Grafana UI:       http://localhost:3000   (admin / admin)
# Prometheus UI:    http://localhost:9090
# OTel Collector:   http://localhost:4317 (gRPC) / http://localhost:4318 (HTTP)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # LGTM — Grafana all-in-one observability stack
  # (Loki + Grafana + Tempo + Mimir + OpenTelemetry Collector + Prometheus)
  # ---------------------------------------------------------------------------
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: windfarmdata-lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "3100:3100"   # Loki
      - "4317:4317"   # OTel Collector gRPC
      - "4318:4318"   # OTel Collector HTTP
      - "9090:9090"   # Prometheus / Mimir
    volumes:
      - ./prometheus.yaml:/otel-lgtm/prometheus.yaml
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend — FastAPI (Uvicorn) + Vue 3 frontend served as static files
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: windfarmdata-backend

    # Load R2 credentials and storage settings.
    # Priority order (highest → lowest):
    #   1. environment: block below  (hardcoded / always-on values)
    #   2. Host shell env vars       ($env:R2_ACCESS_KEY_ID etc. in PowerShell)
    #   3. .env file on disk         (optional convenience – copy .env.example)
    env_file:
      - path: .env
        required: false

    environment:
      # Always use R2 as the storage backend in Docker (parquet files in R2)
      STORAGE_BACKEND: "r2"
      # Frontend is served from the same origin — no cross-origin requests
      CORS_ORIGINS: ""
      # Pass R2 credentials through from the host shell environment.
      # In PowerShell set them with:
      #   $env:R2_ACCESS_KEY_ID      = "your-key"
      #   $env:R2_SECRET_ACCESS_KEY  = "your-secret"
      R2_ACCESS_KEY_ID:
      R2_SECRET_ACCESS_KEY:
      R2_ENDPOINT_URL: "https://7cf52f0e0957036ef8b28411ed958be4.r2.cloudflarestorage.com"
      R2_BUCKET_NAME: "windfarmdata"
      # Telemetry — point to the lgtm service inside the Docker network
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4318"
      LOKI_ENDPOINT: "http://lgtm:3100/loki/api/v1/push"

    depends_on:
      - lgtm

    ports:
      - "80:8000"    # App (frontend + API) accessible on http://localhost
      - "8000:8000"  # Also accessible directly on port 8000

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/wind-farms')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# (no named volumes required — R2 data is accessed directly over S3)

