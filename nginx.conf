# =============================================================================
# nginx.conf — Vue SPA + reverse proxy for the FastAPI backend
#
# Placed at /etc/nginx/conf.d/default.conf inside the frontend container.
# =============================================================================

server {
    listen 80;
    server_name _;

    # -------------------------------------------------------------------------
    # Static assets — serve from the Vite build output
    # -------------------------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets when available (.gz / .br)
    gzip_static on;

    # Cache static assets aggressively (Vite adds content hashes to filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # API reverse proxy — forward /wind-farms/* to the FastAPI backend
    # The backend container is reachable via the service name "backend"
    # when using docker-compose.
    # -------------------------------------------------------------------------
    location /wind-farms {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — day-data queries over large parquet sets can take a while
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # -------------------------------------------------------------------------
    # Vue SPA fallback — unknown paths return index.html so Vue Router works
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}

