# Wind Farm Data API — Continuous Integration
#
# Jobs:
#   backend     — lint with flake8, run pytest + coverage (88% threshold)
#   performance — run pytest-benchmark, compare against previous baseline (5% threshold)
#   frontend    — build with Vite

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — lint + test + coverage
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 backend/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ tests/ --count --exit-zero --max-line-length=100 --statistics

      - name: Run pytest with coverage
        run: pytest --tb=short -q --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: .pytest_cache/

  # ---------------------------------------------------------------------------
  # Performance — benchmark with 5 % regression threshold
  #
  # Strategy:
  #   1. Download benchmark results from the previous run (artefact: benchmark-baseline).
  #      First run has no baseline → comparison is skipped, exits 0.
  #   2. Run pytest-benchmark → benchmark-current.json.
  #   3. scripts/check_benchmark_regression.py compares the two.
  #      Any benchmark > 5 % slower fails the job.
  #   4. Upload current results as the new baseline for the next run.
  #
  # Only runs on Python 3.12 so timing comparisons are apples-to-apples.
  # ---------------------------------------------------------------------------
  performance:
    name: Performance benchmarks (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # continue-on-error so the first run (no artefact yet) still passes
      - name: Download previous benchmark baseline
        id: download_baseline
        uses: actions/download-artifact@v4
        with:
          name: benchmark-baseline
          path: .benchmarks/baseline/
        continue-on-error: true

      - name: Run benchmarks
        run: |
          pytest tests/test_performance.py \
            --benchmark-only \
            --benchmark-json=.benchmarks/benchmark-current.json \
            --benchmark-min-rounds=5 \
            --benchmark-disable-gc \
            --benchmark-sort=mean \
            -v

      - name: Check for performance regressions (5 % threshold)
        run: |
          python scripts/check_benchmark_regression.py \
            --baseline .benchmarks/baseline/benchmark-baseline.json \
            --current  .benchmarks/benchmark-current.json \
            --threshold 5.0

      - name: Upload new baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: .benchmarks/benchmark-current.json
          overwrite: true
          retention-days: 90

      - name: Upload benchmark history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-run-${{ github.run_number }}
          path: .benchmarks/benchmark-current.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Frontend — build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-node${{ matrix.node-version }}
          path: frontend/dist/
          retention-days: 7

